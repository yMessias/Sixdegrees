services:
  - type: web
    name: sixdegrees-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health/
    envVars:
      - key: TMDB_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

  - type: web
    name: sixdegrees-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Ex.: https://seu-backend.onrender.com/api
      - key: VITE_API_BASE
        sync: false
